<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faiz Ahmad — Guild Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0f0e17;overflow:hidden;font-family:'Press Start 2P',monospace}
        canvas{image-rendering:pixelated;image-rendering:crisp-edges}
        #start-screen{position:fixed;inset:0;z-index:100;background:linear-gradient(180deg,#0f0e17 0%,#1a1a2e 50%,#16213e 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s}
        #start-screen.hidden{opacity:0;pointer-events:none}
        .title-wrapper{text-align:center;margin-bottom:20px}
        #start-screen h1{font-size:2.2rem;color:#f0e040;text-shadow:3px 3px 0 #8b6914,0 0 20px rgba(240,224,64,.3);margin-bottom:8px;letter-spacing:2px}
        #start-screen .sub{font-size:.65rem;color:#88ccff;margin-bottom:6px}
        #start-screen .sub2{font-size:.42rem;color:#666;margin-bottom:30px;line-height:2}
        .pixel-border{border:3px solid #f0e040;box-shadow:0 0 15px rgba(240,224,64,.15),inset 0 0 15px rgba(0,0,0,.5);padding:20px 30px;background:rgba(26,26,46,.8);margin-bottom:24px;max-width:420px;text-align:center}
        .stat-row{display:flex;gap:16px;justify-content:center;margin:12px 0}
        .stat-box{text-align:center;padding:8px 12px;background:rgba(0,0,0,.3);border:1px solid #333}
        .stat-num{color:#f0e040;font-size:.7rem;display:block}
        .stat-lbl{color:#888;font-size:.3rem;margin-top:4px;display:block}
        #start-btn{font-family:'Press Start 2P',monospace;font-size:.85rem;padding:14px 40px;background:linear-gradient(180deg,#f0e040,#cc9933);color:#1a1a2e;border:none;cursor:pointer;box-shadow:0 4px 0 #8b6914;transition:transform .1s;position:relative;top:0}
        #start-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #8b6914}
        .hint{font-size:.32rem;color:#444;margin-top:16px;line-height:2.2;max-width:460px;text-align:center}
        #dialog-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);align-items:center;justify-content:center}
        #dialog-overlay.active{display:flex}
        #dialog-box{background:#16162b;border:3px solid #f0e040;border-radius:2px;width:92%;max-width:620px;max-height:82vh;box-shadow:0 0 60px rgba(240,224,64,.1),8px 8px 0 rgba(0,0,0,.4);animation:dopen .2s ease}
        @keyframes dopen{from{transform:scale(.92) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
        #dialog-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:2px solid #2a2a3e;background:linear-gradient(180deg,#1a1a35,#111128)}
        #dialog-title{color:#f0e040;font-size:.55rem}
        #dialog-close-btn{font-family:'Press Start 2P',monospace;font-size:.33rem;background:#2a2a3e;color:#888;border:1px solid #444;padding:4px 8px;cursor:pointer;transition:all .15s}
        #dialog-close-btn:hover{background:#cc3333;color:#fff;border-color:#cc3333}
        #dialog-body{padding:14px;color:#ccc;font-size:.46rem;line-height:2.2;max-height:56vh;overflow-y:auto}
        #dialog-body::-webkit-scrollbar{width:5px}
        #dialog-body::-webkit-scrollbar-thumb{background:#f0e040;border-radius:3px}
        #dialog-body h3{color:#f0e040;font-size:.52rem;margin:10px 0 6px}
        #dialog-body h3:first-child{margin-top:0}
        .tag{display:inline-block;background:rgba(240,224,64,.06);border:1px solid rgba(240,224,64,.2);padding:3px 8px;margin:2px;font-size:.35rem;color:#f0e040;transition:all .15s}
        .tag:hover{background:rgba(240,224,64,.15)}
        .exp-item{background:rgba(255,255,255,.02);border-left:3px solid #f0e040;padding:10px 12px;margin:8px 0}
        .exp-role{color:#fff;font-size:.46rem}.exp-company{color:#88ccff;font-size:.4rem;margin:3px 0}.exp-date{color:#666;font-size:.33rem}.exp-desc{color:#aaa;font-size:.36rem;margin-top:6px;line-height:2}
        .pcard{background:rgba(255,255,255,.02);border:1px solid #2a2a3e;padding:10px;margin:7px 0;transition:border-color .15s}.pcard:hover{border-color:#f0e040}
        .pname{color:#fff;font-size:.46rem}.pdate{color:#666;font-size:.31rem;margin:3px 0}.pdesc{color:#aaa;font-size:.36rem;line-height:2}
        .sgroup{margin:8px 0}.slabel{color:#88ccff;font-size:.38rem;margin-bottom:5px}
        .clink{display:block;color:#88ccff;font-size:.4rem;padding:5px 0;text-decoration:none;transition:color .15s}.clink:hover{color:#f0e040}
        #dialog-footer{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:2px solid #2a2a3e}
        #dialog-footer .hint2{color:#444;font-size:.3rem}
        .dnav{display:flex;align-items:center;gap:6px}
        .dnav-btn{font-family:'Press Start 2P',monospace;font-size:.31rem;background:rgba(240,224,64,.06);color:#f0e040;border:1px solid #f0e040;padding:4px 10px;cursor:pointer;transition:all .15s}
        .dnav-btn:hover{background:#f0e040;color:#16162b}
        #page-info{color:#555;font-size:.3rem}
        #mobile-controls{display:none;position:fixed;bottom:16px;left:16px;z-index:50}
        .mc-dpad{display:grid;grid-template-areas:". u ." "l . r" ". d .";gap:3px}
        .mc-btn{width:46px;height:46px;background:rgba(240,224,64,.1);border:2px solid rgba(240,224,64,.25);color:#f0e040;font-size:.9rem;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;user-select:none;-webkit-user-select:none}
        .mc-u{grid-area:u}.mc-l{grid-area:l}.mc-r{grid-area:r}.mc-d{grid-area:d}
        .mc-extra{position:fixed;bottom:16px;right:16px;display:flex;gap:10px;z-index:50}
        .mc-action{width:52px;height:52px;border-radius:50%;font-family:'Press Start 2P',monospace;font-size:.55rem;cursor:pointer;border:2px solid;display:flex;align-items:center;justify-content:center}
        #mc-jump{background:rgba(100,200,255,.15);border-color:#88ccff;color:#88ccff}
        #mc-interact{background:rgba(240,224,64,.15);border-color:#f0e040;color:#f0e040}
        @media(max-width:768px){#mobile-controls,.mc-extra{display:flex!important}#start-screen h1{font-size:1.5rem}.pixel-border{padding:12px 16px;margin:0 10px 20px}}
    </style>
</head>
<body>

<div id="start-screen">
    <div class="title-wrapper">
        <h1>FAIZ AHMAD</h1>
        <p class="sub">~ The Guild of Achievement ~</p>
        <p class="sub2">A Portfolio RPG Experience</p>
    </div>
    <div class="pixel-border">
        <div class="stat-row">
            <div class="stat-box"><span class="stat-num">2+</span><span class="stat-lbl">CAMPAIGNS</span></div>
            <div class="stat-box"><span class="stat-num">5+</span><span class="stat-lbl">QUESTS</span></div>
            <div class="stat-box"><span class="stat-num">1</span><span class="stat-lbl">PUBLICATION</span></div>
            <div class="stat-box"><span class="stat-num">10+</span><span class="stat-lbl">SKILLS</span></div>
        </div>
    </div>
    <button id="start-btn">⚔ ENTER GUILD ⚔</button>
    <p class="hint">
        WASD / Arrows = Move &nbsp;·&nbsp; SPACE = Jump &nbsp;·&nbsp; E = Interact &nbsp;·&nbsp; ESC = Close<br>
        Walk up to exhibits and press E to discover the guild master's journey
    </p>
</div>

<div id="game-container"></div>

<div id="dialog-overlay">
    <div id="dialog-box">
        <div id="dialog-header">
            <span id="dialog-title"></span>
            <button id="dialog-close-btn">✕ ESC</button>
        </div>
        <div id="dialog-body"></div>
        <div id="dialog-footer">
            <span class="hint2">ESC close · ← → pages</span>
            <div class="dnav">
                <button class="dnav-btn" id="prev-btn" style="display:none">◀ Prev</button>
                <span id="page-info"></span>
                <button class="dnav-btn" id="next-btn" style="display:none">Next ▶</button>
            </div>
        </div>
    </div>
</div>

<div id="mobile-controls">
    <div class="mc-dpad">
        <div class="mc-btn mc-u" data-d="up">▲</div>
        <div class="mc-btn mc-l" data-d="left">◀</div>
        <div class="mc-btn mc-r" data-d="right">▶</div>
        <div class="mc-btn mc-d" data-d="down">▼</div>
    </div>
</div>
<div class="mc-extra" style="display:none">
    <button class="mc-action" id="mc-jump">J</button>
    <button class="mc-action" id="mc-interact">E</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script src="game.js"></script>
</body>
</html>
